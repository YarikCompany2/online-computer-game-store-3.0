<div class="min-h-[80vh] flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-2xl border border-white/10 p-10 rounded-[40px] shadow-2xl">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black italic tracking-tighter text-white uppercase mb-2">Welcome Back</h1>
      <p class="text-slate-400 text-sm">Enter your details to access your library</p>
    </div>

    @if (error()) {
      <div class="bg-rose-500/10 border border-rose-500/50 text-rose-500 p-4 rounded-2xl mb-6 text-sm text-center">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 ml-4">Email or Username</label>
        <input type="text" 
              name="identifier" 
              [(ngModel)]="identifier" 
              required
              class="w-full bg-slate-800/50 border border-white/5 rounded-2xl py-4 px-6 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-600"
              placeholder="Your email or username...">
      </div>

      <div class="space-y-2">
        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 ml-4">Password</label>
        <input type="password" name="password" [(ngModel)]="password" required
               class="w-full bg-slate-800/50 border border-white/5 rounded-2xl py-4 px-6 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-600"
               placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="isLoading()"
              class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex justify-center items-center">
        @if (isLoading()) {
          <div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        } @else {
          SIGN IN
        }
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-slate-500 text-sm">
        Don't have an account? 
        <a routerLink="/register" class="text-indigo-400 font-bold hover:underline transition-colors">Create one</a>
      </p>
    </div>
  </div>
</div>
