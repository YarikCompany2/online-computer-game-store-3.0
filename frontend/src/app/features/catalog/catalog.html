<div class="p-8 max-w-7xl mx-auto">
  <h1 class="text-4xl font-bold mb-8 text-indigo-400">Featured Games</h1>
  
  @if (isLoading()) {
    <div class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      @for (game of games(); track game.id) {
        <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:border-indigo-500 transition-all shadow-lg group">
          <div class="h-48 bg-gray-700 flex items-center justify-center relative">
            <span class="text-gray-500 group-hover:scale-110 transition-transform">{{game.title}}</span>
          </div>
          <div class="p-5">
            <h3 class="text-xl font-bold mb-2 truncate">{{ game.title }}</h3>
            <p class="text-gray-400 text-sm h-10 overflow-hidden mb-4">{{ game.description }}</p>
            
            <div class="flex justify-between items-center mt-4">
              <span class="text-2xl font-bold text-green-400">
                {{ game.price === 0 ? 'FREE' : '$' + game.price }}
              </span>
              <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                Add to Cart
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
