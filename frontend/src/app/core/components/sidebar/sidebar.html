<aside class="flex flex-col h-full bg-[#0B0F1A] border-r border-slate-800 p-6">
  
  <div class="flex items-center gap-4 mb-12">
    <button class="text-indigo-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
      </svg>
    </button>
  </div>

  <nav class="space-y-2">
    <a routerLink="/" 
      routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500/20" 
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all border border-transparent">
      
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      
      <span class="font-bold uppercase text-[10px] tracking-widest">Store</span>
    </a>
    
    <a routerLink="/library" 
      routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500/20"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all border border-transparent">
      
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      
      <span class="font-bold uppercase text-[10px] tracking-widest">Library</span>
    </a>

    @if (authService.currentUser()?.companyId) {
      <div class="pt-4 mt-4 border-t border-slate-800/50">
        <p class="px-4 mb-2 text-[8px] font-black uppercase tracking-[0.3em] text-slate-600">Management</p>
        <a routerLink="/dashboard" 
          routerLinkActive="bg-emerald-600/10 text-emerald-400 border-emerald-500/20" 
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all border border-transparent">
          
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
          </svg>
          
          <span class="font-bold uppercase text-[10px] tracking-widest">Dev Hub</span>
        </a>
      </div>
    }
    @let role = authService.currentUser()?.role;
    @if (role === 'admin' || role === 'moderator') {
      <div class="pt-4 mt-4 border-t border-slate-800/50">
        <p class="px-4 mb-2 text-[8px] font-black uppercase tracking-[0.3em] text-slate-600">Platform Control</p>
        
        <a routerLink="/moderation" 
           routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500/20"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
           <span class="font-bold uppercase text-[10px] tracking-widest">Moderation</span>
        </a>

        @if (role === 'admin') {
          <a routerLink="/admin-hub" 
             routerLinkActive="bg-rose-600/10 text-rose-400 border-rose-500/20"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
             <span class="font-bold uppercase text-[10px] tracking-widest">Revenue Hub</span>
          </a>
        }
      </div>
    }
  </nav>

</aside>
