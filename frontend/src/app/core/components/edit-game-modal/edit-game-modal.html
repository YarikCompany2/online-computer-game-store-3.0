<div class="fixed inset-0 z-[200] overflow-y-auto bg-black/90 backdrop-blur-md animate-in fade-in duration-300">
  <div class="min-h-full flex items-center justify-center p-6">
    
    <div class="w-full max-w-2xl bg-[#1e232b] border border-[#316282]/40 rounded-sm shadow-[0_20px_60px_rgba(0,0,0,0.8)] relative p-12">
      
      <div class="absolute -top-12 -right-12 w-32 h-32 bg-[#66c0f4]/5 blur-3xl rounded-full"></div>

      <header class="mb-12">
        <div class="flex items-center gap-3 mb-2">
            <span class="w-1 h-8 bg-[#66c0f4] shadow-[0_0_15px_rgba(102,192,244,0.3)]"></span>
            <h2 class="text-4xl font-black text-white uppercase tracking-tighter">Edit Project</h2>
        </div>
        <p class="text-[#8f98a0] text-[10px] font-bold uppercase tracking-[0.4em] ml-4 opacity-60">Management Console</p>
      </header>

      <div class="space-y-8 relative z-10">
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-[0.3em] text-[#4e5667] ml-1">App Title</label>
          <input type="text" [(ngModel)]="editData.title"
                 class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-4 px-6 text-[#c7d5e0] outline-none focus:border-[#66c0f4]/50 transition-all font-bold text-lg">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-[0.3em] text-[#4e5667] ml-1">Product Description</label>
          <textarea [(ngModel)]="editData.description" rows="6"
                    class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-4 px-6 text-[#c7d5e0] outline-none focus:border-[#66c0f4]/50 transition-all resize-none leading-relaxed font-medium"></textarea>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-[0.3em] text-[#4e5667] ml-1">Standard Price (USD)</label>
          <div class="flex items-center bg-[#171a21] border border-[#316282]/30 rounded-sm px-6 focus-within:border-[#66c0f4]/50 transition-all">
            <span class="text-[#66c0f4] font-black text-xl mr-3 select-none">$</span>
            <input type="number" [(ngModel)]="editData.price"
                   placeholder="0.00"
                   class="flex-1 bg-transparent border-none py-4 text-white text-xl font-black outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
          </div>
        </div>

        <div class="pt-10 mt-10 border-t border-white/5 space-y-6">
          <div class="flex items-center gap-2 ml-1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="3">
              <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
              <path d="M12 9v4"/><path d="M12 17h.01"/>
            </svg>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-rose-500/70">Restrictive Actions</p>
          </div>
          
          <div class="flex flex-col md:flex-row gap-4">
            <button (click)="toggleStatus()" 
                    [disabled]="game.status === 'pending_moderation'"
                    [class.opacity-40]="game.status === 'pending_moderation'"
                    [class.cursor-not-allowed]="game.status === 'pending_moderation'"
                    class="flex-1 py-4 bg-[#171a21] border border-[#316282]/30 text-[#8f98a0] rounded-sm font-black text-[10px] uppercase tracking-widest transition-all">
              {{ game.status === 'active' ? 'Deactivate Product' : 'Activate Product' }}
            </button>

            <button (click)="deleteGame()" 
                    [disabled]="game.status === 'pending_moderation'"
                    [class.opacity-60]="game.status === 'pending_moderation'"
                    [class.cursor-not-allowed]="game.status === 'pending_moderation'"
                    class="flex-1 py-4 bg-rose-600/5 border border-rose-500/20 text-rose-500/60 hover:text-rose-500 hover:bg-rose-500/10 transition-all text-[10px] font-black uppercase tracking-widest rounded-sm">
              Delete Permanently
            </button>
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 pt-10 border-t border-white/5">
          <button (click)="close.emit()" 
                  class="flex-1 py-5 text-[#4e5667] font-black hover:text-white uppercase tracking-[0.3em] text-[10px] transition-colors">
            Discard
          </button>
          <button (click)="save()" [disabled]="isLoading()"
                  class="flex-[2] bg-[#66c0f4] hover:bg-[#55a9d8] text-[#171a21] py-5 rounded-sm font-black text-xs uppercase tracking-[0.4em] shadow-xl shadow-[#66c0f4]/10 transition-all active:scale-95 disabled:opacity-20">
            {{ isLoading() ? 'Syncing...' : 'Update Records' }}
          </button>
        </div>
      </div>

      <button (click)="close.emit()" class="absolute top-8 right-8 text-[#4e5667] hover:text-white transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

    </div>
  </div>
</div>
