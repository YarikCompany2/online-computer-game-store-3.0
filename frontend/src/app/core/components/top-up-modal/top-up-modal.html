<div class="fixed inset-0 z-[999] flex justify-center items-start overflow-y-auto p-4 md:p-10 bg-black/90 backdrop-blur-md">
  <div class="w-full max-w-xl bg-[#1e232b] border border-[#316282]/40 p-6 md:p-10 rounded-sm shadow-[0_20px_60px_rgba(0,0,0,0.8)] relative my-auto">
    
    <header class="mb-8 flex justify-between items-start">
      <div>
        <h2 class="text-3xl font-black text-white italic uppercase tracking-tighter leading-none">Add Funds</h2>
        <p class="text-[#8f98a0] text-[10px] font-bold uppercase tracking-[0.3em] mt-3">SAD Wallet Service</p>
      </div>
      <div class="hidden sm:block px-3 py-1 bg-[#a4d007]/10 border border-[#a4d007]/20 text-[#a4d007] text-[10px] font-bold uppercase rounded-sm">Verified Secure</div>
    </header>

    <div class="mb-8 relative aspect-[1.7/1] bg-gradient-to-br from-[#316282] to-[#1e232b] rounded-md p-6 md:p-8 border border-white/10 shadow-2xl overflow-hidden">
      <div class="flex justify-between items-start mb-8 md:mb-12">
        <div class="w-10 h-8 bg-[#cfb53b]/80 rounded-sm flex flex-col justify-around p-1">
          <div class="h-0.5 bg-black/20 w-full"></div>
          <div class="h-0.5 bg-black/20 w-full"></div>
        </div>
        <span class="text-white/30 italic font-black text-lg tracking-tighter uppercase">Sad Bank</span>
      </div>

      <div class="text-xl md:text-2xl font-mono text-white tracking-[0.15em] mb-8 drop-shadow-lg">
        {{ cardNumber() || '0000 0000 0000 0000' }}
      </div>

      <div class="flex justify-between items-end">
        <div>
          <p class="text-[7px] uppercase text-[#c7d5e0]/60 font-bold">Holder</p>
          <p class="text-xs font-bold text-white uppercase">{{ currentUser()?.username }}</p>
        </div>
        <div class="text-right">
          <p class="text-[7px] uppercase text-[#c7d5e0]/60 font-bold">Expires</p>
          <p class="text-xs font-bold text-white">{{ cardExpiry() || 'MM/YY' }}</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2 space-y-1">
        <label class="text-[9px] font-black uppercase text-[#4e5667] ml-1">Card Number</label>
        <input type="text" 
              [value]="cardNumber()"
              (input)="onCardInput($event)"
              placeholder="0000 0000 0000 0000"
              class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-2.5 px-4 text-white outline-none font-mono">
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black uppercase text-[#4e5667] ml-1">Expiry (MM/YY)</label>
        <input type="text" 
              [value]="cardExpiry()"
              (input)="onExpiryInput($event)"
              placeholder="MM/YY"
              class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-2.5 px-4 text-white outline-none text-center font-mono">
      </div>

      <div class="space-y-1">
        <label class="text-[9px] font-black uppercase text-[#4e5667] ml-1">CVV</label>
        <input type="password" 
              [value]="cardCvv()"
              (input)="onCvvInput($event)"
              placeholder="•••"
              class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-2.5 px-4 text-white outline-none text-center tracking-[0.5em]">
      </div>

      <div class="col-span-2 space-y-1 pt-2">
        <label class="text-[9px] font-black uppercase text-[#4e5667] ml-1">Amount ($)</label>
        <input type="text" 
              [value]="amount()"
              (input)="onAmountInput($event)"
              placeholder="Min $1"
              class="w-full bg-[#171a21] border border-[#316282]/30 rounded-sm py-3 px-4 text-[#a4d007] outline-none font-black text-xl italic">
      </div>
    </div>

    <div class="flex gap-4 mt-8">
      <button (click)="onCancel()" class="flex-1 py-3 text-[#8f98a0] font-bold text-xs uppercase hover:text-white transition-colors">Discard</button>
      <button (click)="confirm()" 
              [disabled]="isLoading() || !isFormValid()"
              class="flex-[2] bg-[#a4d007] disabled:opacity-20 hover:bg-[#bef30a] text-[#171a21] py-3 rounded-sm font-black text-xs uppercase tracking-widest shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
        @if (isLoading()) {
          <div class="w-4 h-4 border-2 border-[#171a21]/30 border-t-[#171a21] rounded-full animate-spin"></div>
          PROCESSING
        } @else {
          ADD TO WALLET
        }
      </button>
    </div>
  </div>
</div>
